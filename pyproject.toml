# Virtual workspace root for the fulcra-tools monorepo. Not a package
# itself — it just ties the packages/ together so `uv sync` resolves the
# intra-repo `fulcra-common` dependency from source.
[tool.uv.workspace]
members = ["packages/*"]
# Exclude non-Python packages that live under packages/ but aren't uv workspace
# members (no pyproject.toml). web-ui is a frontend — globbing it as a member
# breaks `uv sync`/`uv run`/`uv tool install` workspace resolution. (The JS/Node
# hermes-vercel + litellm packages that also used to need excluding were
# extracted to their own standalone repos — ashfulcra/fulcra-hermes-vercel and
# ashfulcra/fulcra-litellm.)
exclude = ["packages/web-ui"]

# Workspace-wide pytest settings — applied when running `pytest packages/`
# from the monorepo root.  Each package also has its own [tool.pytest.ini_options]
# for per-package invocations.
[tool.pytest.ini_options]
# importlib mode imports each test file by its absolute path rather than by
# dotted module name, which prevents ImportPathMismatchError / module-name
# collisions when multiple packages share identically-named test files
# (e.g. tests/test_cli.py, tests/conftest.py) under a workspace-wide run.
addopts = "--import-mode=importlib"
# Each package's tests/ directory is added to sys.path so that test modules
# can do `import media_test_helpers` / `import dayone_test_helpers` /
# `import collect_test_helpers` (plain helper functions/classes that aren't
# pytest fixtures).  Module names are package-prefixed to avoid sys.path
# shadowing between packages.  Only packages that have helper modules listed.
pythonpath = [
    "packages/collect/tests",
    "packages/coord-engine/tests",
    "packages/dayone/tests",
    "packages/labs/tests",
    "packages/media-helpers/tests",
]
