name: macOS CI

# Runs the full Python test suite on macOS so the macOS-only code paths
# (PyObjC menubar, UserNotifications bundle guard, fulcra-CLI resolution
# under launchd's restricted PATH) are exercised. The two regressions the
# other-machine onboarding session hit (`bundleProxyForCurrentProcess is
# nil` crash, sign-in path resolving `shutil.which("fulcra")` to None) both
# merged because nothing tested those paths on a clean macOS runner.
#
# COST: macOS runners bill at 10x on this repo, and this job runs the
# WHOLE workspace (incl. PyObjC, which can't even install on Linux), so it
# cannot simply move to ubuntu. To stop draining the Actions free tier on
# changes with no macOS-specific content, the triggers are PATH-FILTERED to
# the files that actually carry macOS behaviour: the menubar package, coord
# engine and automation adapters, plus this
# workflow and the dependency manifests (a dep bump can break the macOS
# build). A change outside this set skips this job; `workflow_dispatch`
# reruns it on demand. If you add a new macOS-specific path, list it in BOTH
# the push and pull_request blocks below.

on:
  push:
    branches: [main]
    paths:
      - 'packages/fulcra-menubar/**'
      - 'packages/coord-engine/**'
      - 'skills/fulcra-agent-automation/**'
      - '.github/workflows/macos.yml'
      - 'pyproject.toml'
      - 'uv.lock'
  pull_request:
    branches: [main]
    paths:
      - 'packages/fulcra-menubar/**'
      - 'packages/coord-engine/**'
      - 'skills/fulcra-agent-automation/**'
      - '.github/workflows/macos.yml'
      - 'pyproject.toml'
      - 'uv.lock'
  workflow_dispatch:

jobs:
  test:
    runs-on: macos-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        # Pinned by series, not @latest, so a uv release can't silently
        # break CI (or hide a real failure under a tooling change). Must be
        # recent enough to build the workspace's git deps: fulcra-api uses the
        # uv_build backend (uv_build>=0.11.3) and `default-groups = "all"`,
        # neither of which the old 0.5.x pin could parse — so `uv sync` failed
        # with a TOML error before any test ran, and EVERY push went red.
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.11.x"
          enable-cache: true

      - name: Set up Python (matches .python-version)
        run: uv python install

      - name: Install workspace with all extras (dev + macos)
        # Bare `uv sync` is NOT enough — pytest is in each package's `dev`
        # extra and PyObjC/rumps is in `macos`. AGENTS.md documents this.
        run: uv sync --all-packages --all-extras

      - name: Run the full test suite
        # Must NOT hit the network. ~1500 tests, ~20s on a clean runner.
        # Fail fast on the first error to surface the cause quickly.
        run: uv run --all-packages --all-extras --no-editable pytest packages/ -q --maxfail=1
