name: macOS CI

# Runs the full Python test suite on macOS so the macOS-only code paths
# (PyObjC menubar, UserNotifications bundle guard, fulcra-CLI resolution
# under launchd's restricted PATH) are exercised on every push + PR. The
# two regressions the other-machine onboarding session hit
# (`bundleProxyForCurrentProcess is nil` crash, sign-in path resolving
# `shutil.which("fulcra")` to None) both merged because nothing tested
# those paths on a clean macOS runner.

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'attention/chrome/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'attention/chrome/**'
  workflow_dispatch:

jobs:
  test:
    runs-on: macos-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        # Pinned by series, not @latest, so a uv release can't silently
        # break CI (or hide a real failure under a tooling change). Must be
        # recent enough to build the workspace's git deps: fulcra-api uses the
        # uv_build backend (uv_build>=0.11.3) and `default-groups = "all"`,
        # neither of which the old 0.5.x pin could parse — so `uv sync` failed
        # with a TOML error before any test ran, and EVERY push went red.
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.11.x"
          enable-cache: true

      - name: Set up Python (matches .python-version)
        run: uv python install

      - name: Install workspace with all extras (dev + macos)
        # Bare `uv sync` is NOT enough — pytest is in each package's `dev`
        # extra and PyObjC/rumps is in `macos`. AGENTS.md documents this.
        run: uv sync --all-packages --all-extras

      - name: Run the full test suite
        # Must NOT hit the network. ~1500 tests, ~20s on a clean runner.
        # Fail fast on the first error to surface the cause quickly.
        run: uv run pytest packages/ attention -q --maxfail=1
