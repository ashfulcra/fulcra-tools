[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "fulcra-netflix-skill"
version = "0.1.0"
description = "Agent skill + vendored importer: onboard a user onto Fulcra, import their Netflix viewing history as a Watched annotation, and share it to the movie-night pool."
requires-python = ">=3.11"
# Deliberately dependency-free: the shipped artifact is the skill folder
# (SKILL.md + a PEP 723 self-contained import script that agents run with
# `uv run`). The package exists so the monorepo's test tooling covers the
# script; runtime users never install it.
dependencies = []

[project.optional-dependencies]
dev = [
    # pytest<8 to stay co-resolvable with fulcra-attention[dev] (which
    # inherits fulcra-api's pytest<8 pin) in the workspace-wide solve.
    "pytest>=7.4,<8",
    "httpx>=0.27",
]

[tool.hatch.build.targets.wheel]
packages = ["fulcra_netflix"]
