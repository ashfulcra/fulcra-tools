[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "fulcra-coord-files"
version = "0.1.0"
description = "No-CAS Fulcra Files object-store transport, extracted from fulcra-coord"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
keywords = ["fulcra", "files", "object-store", "transport"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
]

# No non-stdlib dependencies — the transport is just subprocess + stdlib
# JSON/pathlib, identical to the code it was extracted from.
dependencies = []

[project.optional-dependencies]
dev = ["pytest>=7.0"]

[tool.hatch.build.targets.wheel]
packages = ["fulcra_coord_files"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
