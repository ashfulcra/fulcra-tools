[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "fde-engine"
dynamic = ["version"]
description = "Engagement engine for the Fulcra FDE skill — seven-phase lifecycle, Fulcra-Files-backed state, deterministic resume"
readme = "README.md"
requires-python = ">=3.12"
license = "MIT"
authors = [{name = "Ash", email = "ash@fulcradynamics.com"}]
# stdlib-only runtime (transport is a CLI-subprocess call to `fulcra-api`); no runtime deps.
dependencies = []

[project.optional-dependencies]
dev = ["pytest"]

[project.scripts]
fde-engine = "fde_engine.cli:main"

[project.urls]
Homepage = "https://github.com/ashfulcra/fulcra-tools"
Repository = "https://github.com/ashfulcra/fulcra-tools"

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra --strict-markers --import-mode=importlib"
# Adds tests/ to sys.path so test modules can `import fde_engine_test_helpers`
# (plain helper classes that aren't pytest fixtures).
pythonpath = ["tests"]

[tool.hatch.version]
path = "fde_engine/__init__.py"

[tool.hatch.build.targets.wheel]
packages = ["fde_engine"]
