[project]
name = "fulcra-attention"
version = "0.1.0"
description = "Capture what takes your attention while browsing, into your own Fulcra account."
readme = "README.md"
requires-python = ">=3.11"
authors = [{name = "ash", email = "redacted@users.noreply.github.com"}]
dependencies = [
    # Shared Fulcra API client (sibling package in this monorepo).
    "fulcra-common",
    "fulcra-collect",
]

[tool.uv.sources]
fulcra-common = { workspace = true }
fulcra-collect = { workspace = true }

[project.optional-dependencies]
# The `fulcra` CLI console script. NOTE (2026-07-06): fulcra-api is in every
# install's tree anyway (fulcra-common hard-depends on it as a library since
# the CRUD delegation), so this extra no longer gates the dependency — what it
# DOES do is ensure the `fulcra` console script lands in the workspace venv
# (`uv sync --all-extras`), which the launchd-proof CLI resolver checks first
# (venv sibling, see fulcra_common.client.find_fulcra_cli). Keep it.
fulcra-cli = [
    "fulcra-api>=0.1.35",
]
dev = [
    # fulcra-api currently pins pytest<8 in its runtime deps, so we must
    # stay compatible with that constraint until upstream loosens it.
    "pytest>=7.4,<8",
    "pytest-mock>=3.12",
    "ruff>=0.5",
]

[project.entry-points."fulcra_collect.plugins"]
attention-relay = "fulcra_attention.collect_plugin:PLUGIN"

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["fulcra_attention*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra --strict-markers"
