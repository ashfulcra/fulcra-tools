[project]
name = "fulcra-attention"
version = "0.1.0"
description = "Capture what takes your attention while browsing, into your own Fulcra account."
readme = "README.md"
requires-python = ">=3.11"
authors = [{name = "ash", email = "redacted@users.noreply.github.com"}]
dependencies = [
    "click>=8.1",
    "httpx>=0.27",
    # Shared Fulcra API client (sibling package in this monorepo).
    "fulcra-common",
    "fulcra-collect",
]

[tool.uv.sources]
fulcra-common = { workspace = true }
fulcra-collect = { workspace = true }

[project.optional-dependencies]
# Optional `fulcra` CLI — never imported as a library (the daemon shells out
# to the binary); installed separately via `uv tool install fulcra-api`. Out
# of base deps so it doesn't drag pyarrow into installs / the bundled app.
fulcra-cli = [
    "fulcra-api @ git+https://github.com/fulcradynamics/fulcra-api-python.git@file-commands",
]
dev = [
    # fulcra-api currently pins pytest<8 in its runtime deps, so we must
    # stay compatible with that constraint until upstream loosens it.
    "pytest>=7.4,<8",
    "pytest-mock>=3.12",
    "ruff>=0.5",
]

[project.scripts]
fulcra-attention = "fulcra_attention.cli:cli"

[project.entry-points."fulcra_collect.plugins"]
attention-relay = "fulcra_attention.collect_plugin:PLUGIN"

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["fulcra_attention*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra --strict-markers"
