[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "fulcra-common"
version = "0.1.0"
description = "Shared Fulcra API client for the fulcra-tools packages."
requires-python = ">=3.11"
dependencies = [
    "httpx>=0.27",
    # Imported as a library (see client.py `_lib()`): tag/definition CRUD and
    # record reads route through fulcra_api. 0.1.34 is the first PyPI release
    # carrying the tag + annotation-definition write methods this client calls
    # (get_tag_by_name/create_tag/create_annotation/delete_annotation); the old
    # git@file-commands branch (0.1.30) lacked them. fulcra-api pins pytest<8,
    # which is why the dev extra below must agree.
    "fulcra-api>=0.1.34",
]

[project.optional-dependencies]
dev = [
    # Pinned <8 to match the other workspace packages, which inherit a
    # pytest<8 constraint from fulcra-api. One pytest resolves for the
    # whole workspace, so all members must agree.
    "pytest>=7.4,<8",
]

[tool.hatch.build.targets.wheel]
packages = ["fulcra_common"]

[tool.pytest.ini_options]
testpaths = ["tests"]
