[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "fulcra-labs"
version = "0.1.0"
description = "Parse lab-report PDFs into one canonical Fulcra data track per marker — verify-before-ingest, model-extracts / code-verifies."
requires-python = ">=3.11"
dependencies = [
    "click>=8.1",
    "httpx>=0.27",
    # Sibling package in this monorepo — the shared Fulcra client + wire format.
    "fulcra-common",
]

[project.scripts]
fulcra-labs = "fulcra_labs.cli:cli"

[tool.uv.sources]
# Resolve the sibling package from the workspace, not PyPI.
fulcra-common = { workspace = true }

[project.optional-dependencies]
# The `fulcra` CLI console script (same rationale as media-helpers): ensures
# the `fulcra` binary lands in the workspace venv so the launchd-proof CLI
# resolver in fulcra_common.client.find_fulcra_cli finds the venv sibling first.
fulcra-cli = [
    "fulcra-api>=0.1.35",
]
dev = [
    # fulcra-api pins pytest<8 in its runtime deps; stay compatible.
    "pytest>=7.4,<8",
    "pytest-mock>=3.12",
    "ruff>=0.5",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra --strict-markers --import-mode=importlib"
# Adds tests/ to sys.path so test modules can `import labs_test_helpers`.
pythonpath = ["tests"]

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.hatch.metadata]
allow-direct-references = true

[tool.hatch.build.targets.wheel]
packages = ["fulcra_labs"]
