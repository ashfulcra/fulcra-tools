# Local project file for the ChatGPT write facade.
#
# Kept SEPARATE from the core fulcra-coord package (../../../pyproject.toml),
# which is intentionally stdlib-only with no dependencies. The facade is an HTTP
# service and therefore declares FastAPI/uvicorn here. It imports the
# fulcra_coord package at runtime (install the repo, or put the repo root on
# PYTHONPATH).
[project]
name = "fulcra-coord-chatgpt-facade"
version = "1.0.0"
description = "HTTP write facade giving a ChatGPT Custom GPT Action a real POST /coordination/report over fulcra-coord"
requires-python = ">=3.10"
dependencies = [
    "fastapi>=0.110",
    "uvicorn[standard]>=0.27",
    "pydantic>=2.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "httpx>=0.27",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
