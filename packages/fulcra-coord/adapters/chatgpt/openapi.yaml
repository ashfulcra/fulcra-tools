openapi: 3.1.0
info:
  title: Fulcra Coordination â€” ChatGPT Action (read direct + write via facade)
  description: >-
    A ChatGPT Custom GPT Action for `fulcra-coord` coordination. It now covers
    **both halves** of the coordination loop:


    * **READ (direct against the real Fulcra HTTP API, `api.fulcradynamics.com`):**
      a two-call resolve+download of the pre-built coordination views that
      `fulcra-coord` materializes into Fulcra Files
      (`resolveCoordinationFile` + `downloadCoordinationFile`,
      plus `statCoordinationFile`). Every path/param is grounded in
      `fulcra_api/core.py`; no endpoints are invented.

    * **WRITE (and an equivalent read) via the coordination facade:**
      `reportMilestone` (`POST /coordination/report`) and
      `getCoordinationStatus` (`GET /coordination/status`) call a thin HTTP
      **facade** (`adapters/chatgpt/facade/`) that wraps the `fulcra_coord`
      package. The facade is what makes a milestone write possible at all.


    WHY THE FACADE EXISTS (the gap it closes): a correct milestone write is NOT
    a single Fulcra HTTP call. It must (1) upload a `tasks/TASK-*.json` task
    file AND (2) rebuild every materialized view (`index.json`,
    `views/{active,next,recently-done,search-index}.json`) with optimistic-
    concurrency + merge. That reconciliation lives in the `fulcra_coord`
    package, not in any single Fulcra endpoint. The Fulcra upload primitive is
    also a two-step presigned flow a GPT Action can't drive. The facade
    encapsulates exactly that package logic behind one POST. **For writes the
    facade supersedes any direct-upload approach** (the direct read operations
    below remain valid and can still be used for reads).


    SECURITY: the two facade operations authenticate with a single shared
    bearer token (`facadeBearer`) that the facade checks; the facade itself
    uses the host's Fulcra CLI credentials to talk to Fulcra. The direct read
    operations authenticate to Fulcra with `fulcraOAuth` (preferred) or
    `fulcraBearer`. See `adapters/chatgpt/facade/README.md`.
  version: 1.1.0
servers:
  # FACADE base URL â€” SET THIS AT DEPLOY. This is where the write facade
  # (adapters/chatgpt/facade) is hosted. reportMilestone / getCoordinationStatus
  # are served from here. Placeholder until deployed.
  - url: https://REPLACE-ME.facade.example.com
    description: Coordination write facade (set at deploy time)
  # Grounding: core.py FULCRA_OIDC_AUDIENCE defaults to
  # "https://api.fulcradynamics.com/", and FulcraAPI derives
  # self.fulcra_api_domain from that audience's hostname. Every direct-read
  # request is https://<that host><url_path>. Used by the resolve/download/stat
  # operations only.
  - url: https://api.fulcradynamics.com
    description: Fulcra production API (direct reads only)
tags:
  - name: coordination
    description: Reading fulcra-coord state from Fulcra Files.
  - name: files
    description: Generic Fulcra Files read operations the coordination reads build on.
  - name: facade
    description: >-
      Coordination write facade operations (POST report + GET status). These
      hit the facade server (first entry under `servers:`), NOT
      api.fulcradynamics.com. The facade wraps the fulcra_coord package so a
      milestone write performs the task upload + view rebuild server-side.
paths:
  /coordination/report:
    post:
      operationId: reportMilestone
      x-openai-isConsequential: true
      servers:
        - url: https://REPLACE-ME.facade.example.com
          description: Coordination write facade (set at deploy time)
      tags:
        - facade
        - coordination
      summary: Report a coordination milestone (create-or-update a task) via the facade.
      description: >-
        Records a milestone for the calling ChatGPT session. The facade
        find-or-creates a task for `(agent_id, session_key)` (or updates
        `task_id` if given), then uploads the task file AND rebuilds all
        materialized views via the `fulcra_coord` package. This is the ONLY way
        a Custom GPT Action can durably write coordination state.


        Authenticated with the shared facade bearer token (`facadeBearer`), NOT
        a Fulcra token â€” the facade uses the host's Fulcra credentials itself.
      security:
        - facadeBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReportRequest"
      responses:
        "200":
          description: The task that was created or updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportResponse"
        "400":
          description: >-
            The requested status transition is not satisfiable via the facade.
            The facade only performs `active`/`waiting`; `done`/`block`/`abandon`
            require the `fulcra-coord` CLI (they need evidence/reason). Note
            that an unsupported `status` value is now rejected earlier as a 422
            by the request schema (the enum is restricted to `active`/`waiting`).
        "401":
          description: Missing or invalid facade token.
        "404":
          description: Explicit task_id given but no such task exists.
        "409":
          description: >-
            Concurrent remote change the facade could not safely merge. The GPT
            should retry or tell the user to run `fulcra-coord reconcile`.
        "422":
          description: >-
            Malformed body: a missing/empty/whitespace-only required field, a
            field exceeding its length cap, or a `status` outside the supported
            `active`/`waiting` enum.
        "502":
          description: >-
            Facade reached but could not write to Fulcra (its host fulcra-api
            may not be authenticated).
  /coordination/status:
    get:
      operationId: getCoordinationStatus
      x-openai-isConsequential: false
      servers:
        - url: https://REPLACE-ME.facade.example.com
          description: Coordination write facade (set at deploy time)
      tags:
        - facade
        - coordination
      summary: Read the active coordination index via the facade.
      description: >-
        Returns the coordination index (counts + active task summaries + recent
        done), optionally filtered by `agent_id` and/or `workstream`. Equivalent
        to the direct two-call read of `index.json`, but as one call against the
        facade. Authenticated with the facade bearer token.
      security:
        - facadeBearer: []
      parameters:
        - name: agent_id
          in: query
          required: false
          description: Filter to tasks owned by this agent id.
          schema:
            type: string
        - name: workstream
          in: query
          required: false
          description: Filter to this workstream.
          schema:
            type: string
      responses:
        "200":
          description: The coordination index view.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoordinationIndex"
        "401":
          description: Missing or invalid facade token.
        "503":
          description: >-
            The coordination backend is unreachable (the facade host's
            fulcra-api may be unauthenticated, or Fulcra is unavailable). This
            is explicitly NOT an empty coordination state â€” the GPT must NOT
            report "no in-flight work"; it should tell the user coordination is
            temporarily unreachable.
  /input/v1/file_upload:
    get:
      operationId: resolveCoordinationFile
      x-openai-isConsequential: false
      tags:
        - coordination
        - files
      summary: Resolve a coordination file path to its current version (and file_id).
      description: >-
        Lists/resolves files under the Fulcra Files namespace. Grounding:
        `core.py` `list_files()` and `resolve_filepath()` both call
        `GET /input/v1/file_upload` with `path` (and optionally `name`,
        `state`) query params and parse a JSON body of the shape
        `{"files": [ ... ]}`.


        To read a coordination view you call this FIRST to turn a known path
        (e.g. `path=/coordination/views`, `name=active.json`) into a
        `file_id`, then pass that `file_id` to `downloadCoordinationFile`.


        Known coordination paths (defaults; the remote root is
        `/coordination` unless `FULCRA_COORD_REMOTE_ROOT` was overridden):
          - path=`/coordination`,        name=`index.json`         (global compact index + active summaries + recent done)
          - path=`/coordination/views`,  name=`active.json`        (all active/waiting/blocked tasks)
          - path=`/coordination/views`,  name=`next.json`          (proposed/waiting â€” candidates to start)
          - path=`/coordination/views`,  name=`recently-done.json` (recently completed/abandoned)
          - path=`/coordination/views`,  name=`search-index.json`  (tag/title/summary search records)
          - path=`/coordination/tasks`,  name=`TASK-<id>.json`     (a single task's full record)
      parameters:
        - name: path
          in: query
          required: true
          description: >-
            Directory path within Fulcra Files, e.g. `/coordination` or
            `/coordination/views`. Maps to the `path` query param in
            `core.py`.
          schema:
            type: string
            example: /coordination/views
        - name: name
          in: query
          required: false
          description: >-
            Optional exact file name to resolve a single file (e.g.
            `active.json`). Maps to the `name` query param used by
            `resolve_filepath()` in `core.py`.
          schema:
            type: string
            example: active.json
        - name: state
          in: query
          required: false
          description: >-
            File lifecycle state filter. `core.py` uses `uploaded` for the
            current version and `uploaded,archived` to include history.
            Default `uploaded` (current versions only).
          schema:
            type: string
            enum:
              - uploaded
              - archived
              - "uploaded,archived"
            default: uploaded
      responses:
        "200":
          description: Matching files (current versions by default).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: No file matched the given path/name.
  /input/v1/file_upload/{file_id}/download:
    get:
      operationId: downloadCoordinationFile
      x-openai-isConsequential: false
      tags:
        - coordination
        - files
      summary: Download a resolved coordination file's contents (the view/task JSON).
      description: >-
        Downloads the raw bytes of a specific file version. Grounding:
        `core.py` `download_file(file_id)` calls
        `GET /input/v1/file_upload/{file_id}/download`. The `file_id` comes
        from a prior `resolveCoordinationFile` call.


        For coordination views the body is JSON. The GPT should parse it and
        summarize in-flight (`active`) and possibly-forgotten work for the
        user.
      parameters:
        - name: file_id
          in: path
          required: true
          description: >-
            The file/version id returned by `resolveCoordinationFile`
            (the `id` field of an entry in `files[]`).
          schema:
            type: string
      responses:
        "200":
          description: The file contents.
          content:
            application/json:
              schema:
                description: >-
                  A coordination view or task JSON document. Shape varies by
                  file; see CoordinationView / CoordinationIndex for the
                  common cases.
                oneOf:
                  - $ref: "#/components/schemas/CoordinationIndex"
                  - $ref: "#/components/schemas/CoordinationView"
                  - type: object
            application/octet-stream:
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: No such file id.
  /input/v1/file_upload/{version_id}:
    get:
      operationId: statCoordinationFile
      x-openai-isConsequential: false
      tags:
        - files
      summary: Get metadata for a specific file version (size, path, uploaded_at).
      description: >-
        Returns metadata about a single file version. Grounding: `core.py`
        `get_file_by_version(version_id)` calls
        `GET /input/v1/file_upload/{version_id}`. Useful to confirm a view's
        freshness (`uploaded_at`) before trusting it.
      parameters:
        - name: version_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: File version metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileVersion"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: No such file version.
components:
  securitySchemes:
    # PREFERRED: OAuth (per-user identity, no shared secret living in the GPT
    # config). Grounding: core.py authenticates every request with
    # `Authorization: Bearer <access_token>` and the OIDC provider is Auth0
    # (FULCRA_OIDC_DOMAIN default "fulcra.us.auth0.com",
    # audience "https://api.fulcradynamics.com/"). The authorization-code flow
    # is supported (get_authorization_code_url / authorize_with_authorization_code).
    # NOTE: the exact Auth0 authorize/token URLs below must be confirmed against
    # the Fulcra Auth0 tenant before shipping â€” see README "Open question".
    fulcraOAuth:
      type: oauth2
      description: >-
        Per-user OAuth via Fulcra's Auth0 tenant. ChatGPT shows a
        "Sign in to fulcradynamics.com" button; thereafter it sends
        `Authorization: Bearer <user-token>` on every call, exactly the header
        core.py uses. This is the recommended auth model (no shared key).
      flows:
        authorizationCode:
          authorizationUrl: https://fulcra.us.auth0.com/authorize
          tokenUrl: https://fulcra.us.auth0.com/oauth/token
          scopes:
            openid: OpenID identity
            profile: Profile info
            email: Email address
            offline_access: Refresh-token support
    # FALLBACK: a single shared bearer token, acceptable ONLY for a strictly
    # private, single-user GPT. Same wire format (Authorization: Bearer ...),
    # but the secret lives in the GPT config rather than per-user.
    fulcraBearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >-
        Shared Fulcra access token (Authorization: Bearer <token>). Use ONLY
        for a private single-user GPT; prefer fulcraOAuth otherwise.
    # FACADE auth: the token the GPT sends to the write facade. This is a
    # facade-owned shared secret (FULCRA_COORD_FACADE_TOKEN on the facade host),
    # NOT a Fulcra token â€” the facade uses the host's own fulcra-api creds to
    # talk to Fulcra. Constant-time compared on every facade request.
    facadeBearer:
      type: http
      scheme: bearer
      description: >-
        Shared bearer token for the coordination facade
        (Authorization: Bearer <token>), matching FULCRA_COORD_FACADE_TOKEN on
        the facade host. Used by reportMilestone and getCoordinationStatus only.
  responses:
    Unauthorized:
      description: >-
        Missing/expired/invalid token. The GPT should tell the user it can't
        reach coordination right now and must NOT fabricate status.
      content:
        application/json:
          schema:
            type: object
            properties:
              detail:
                type: string
  schemas:
    FileListResponse:
      type: object
      description: >-
        Response of GET /input/v1/file_upload. core.py reads `rbody["files"]`.
      properties:
        files:
          type: array
          items:
            $ref: "#/components/schemas/FileVersion"
      required:
        - files
    FileVersion:
      type: object
      description: >-
        One file version. Fields observed in core.py / cli.py:
        `id`, `path`, `name`, `size`, `uploaded_at`, `state`.
      properties:
        id:
          type: string
          description: File/version id. Pass to downloadCoordinationFile as file_id.
        path:
          type: string
          example: /coordination/views
        name:
          type: string
          example: active.json
        size:
          type: integer
          description: Size in bytes.
        uploaded_at:
          type: string
          format: date-time
        state:
          type: string
          enum:
            - uploaded
            - archived
    TaskSummary:
      type: object
      description: >-
        Compact task record as it appears inside coordination views
        (fulcra_coord `task_summary`). Fields shown are the load-bearing ones
        for answering "what am I working on"; other fields may be present.
      properties:
        task_id:
          type: string
          example: TASK-20260601-chatgpt-action-ab12
        title:
          type: string
        status:
          type: string
          enum:
            - proposed
            - active
            - waiting
            - blocked
            - done
            - abandoned
        priority:
          type: string
          example: P2
        workstream:
          type: string
        owner_agent:
          type: string
          description: Which agent owns the task (e.g. chatgpt:fulcra-coord:ash).
        summary:
          type: string
        next_action:
          type: string
        updated_at:
          type: string
          format: date-time
    CoordinationView:
      type: object
      description: >-
        A materialized view file (views/active.json, next.json,
        recently-done.json). schema = "fulcra.coordination.view.v1".
      properties:
        schema:
          type: string
          example: fulcra.coordination.view.v1
        view:
          type: string
          enum:
            - active
            - next
            - recently-done
        updated_at:
          type: string
          format: date-time
        tasks:
          type: array
          items:
            $ref: "#/components/schemas/TaskSummary"
    CoordinationIndex:
      type: object
      description: >-
        The global index file (/coordination/index.json).
        schema = "fulcra.coordination.index.v1".
      properties:
        schema:
          type: string
          example: fulcra.coordination.index.v1
        updated_at:
          type: string
          format: date-time
        counts:
          type: object
          properties:
            by_status:
              type: object
              additionalProperties:
                type: integer
            by_workstream:
              type: object
              additionalProperties:
                type: integer
            by_agent:
              type: object
              additionalProperties:
                type: integer
        active:
          type: array
          items:
            $ref: "#/components/schemas/TaskSummary"
        recent_done:
          type: array
          items:
            $ref: "#/components/schemas/TaskSummary"
    ReportRequest:
      type: object
      description: >-
        Body of POST /coordination/report. `agent_id` + `session_key` identify
        the ChatGPT working session (the GPT mints `session_key`; the platform
        gives no session id). If `task_id` is supplied that exact task is
        updated; otherwise the facade find-or-creates the task for this
        (agent_id, session_key).
      required:
        - agent_id
        - session_key
        - summary
      properties:
        agent_id:
          type: string
          minLength: 1
          maxLength: 200
          example: chatgpt:fulcra-coord:ash
        session_key:
          type: string
          minLength: 1
          maxLength: 200
          example: 20260601T1730Z-r7q2
        summary:
          type: string
          minLength: 1
          maxLength: 4000
          description: One-line current status / milestone. Must not be blank/whitespace-only.
        next_action:
          type: string
          maxLength: 2000
          description: What happens next (optional).
        title:
          type: string
          maxLength: 256
          description: Task title â€” used only when creating a new task. Must not be blank/whitespace-only.
        workstream:
          type: string
          maxLength: 100
          description: Workstream label â€” used only when creating (default "general").
        status:
          type: string
          description: >-
            Optional status transition. Restricted to the values the facade can
            satisfy from a find-or-create flow. `done`/`block`/`abandon` are NOT
            available here â€” they need evidence/reason and must go through the
            `fulcra-coord` CLI.
          enum:
            - active
            - waiting
        task_id:
          type: string
          maxLength: 200
          description: Update this exact task instead of find-or-create.
    ReportResponse:
      type: object
      description: Result of a milestone report.
      required:
        - task_id
        - status
        - created
      properties:
        task_id:
          type: string
          example: TASK-20260601-chatgpt-facade-ab12cd34
        status:
          type: string
          example: active
        created:
          type: boolean
          description: True if a new task was created; false if an existing one was updated.
        needs_reconcile:
          type: boolean
          description: >-
            True if the task was written but some views failed and need a
            `fulcra-coord reconcile` pass.
# Applied globally: prefer OAuth, allow shared-bearer fallback. Per-operation
# `security:` on the facade operations overrides this with facadeBearer.
security:
  - fulcraOAuth: []
  - fulcraBearer: []
