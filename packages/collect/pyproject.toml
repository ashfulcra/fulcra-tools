[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "fulcra-collect"
version = "0.1.0"
description = "Background hub that hosts the Fulcra local helpers as plugins."
requires-python = ">=3.11"
dependencies = [
    "click>=8.1",
    "keyring>=25",
    "tomlkit>=0.12",
    "fulcra-common",
    "fastapi>=0.115",
    "uvicorn[standard]>=0.30",
    "pydantic>=2.7",
    "httpx>=0.27",
    # FastAPI needs python-multipart to parse multipart/form-data, which
    # is how the wizard's file_upload step streams user-picked files (e.g.
    # Spotify Extended takeouts, Apple takeouts) into the daemon. Without
    # this dep, /api/plugin/{id}/upload would 500 with "form parsers are
    # not installed" on first use.
    "python-multipart>=0.0.9",
]

[tool.uv.sources]
fulcra-common = { workspace = true }

[project.scripts]
fulcra-collect = "fulcra_collect.cli:cli"

[project.optional-dependencies]
dev = [
    "pytest>=7.4,<8",
    "pytest-mock>=3.12",
    "ruff>=0.5",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra --strict-markers"

[tool.hatch.build.targets.wheel]
packages = ["fulcra_collect"]
