[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "fulcra-collect"
version = "0.1.0"
description = "Background hub that hosts the Fulcra local helpers as plugins."
requires-python = ">=3.11"
dependencies = [
    "click>=8.1",
    "keyring>=25",
    "tomlkit>=0.12",
    "fulcra-common",
    "fastapi>=0.115",
    "uvicorn[standard]>=0.30",
    "pydantic>=2.7",
    "httpx>=0.27",
    # FastAPI needs python-multipart to parse multipart/form-data, which
    # is how the wizard's file_upload step streams user-picked files (e.g.
    # Spotify Extended takeouts, Apple takeouts) into the daemon. Without
    # this dep, /api/plugin/{id}/upload would 500 with "form parsers are
    # not installed" on first use.
    "python-multipart>=0.0.9",
]

[tool.uv.sources]
fulcra-common = { workspace = true }

[project.scripts]
fulcra-collect = "fulcra_collect.cli:cli"

[project.optional-dependencies]
dev = [
    "pytest>=7.4,<8",
    "pytest-mock>=3.12",
    "ruff>=0.5",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra --strict-markers"

[tool.hatch.build.targets.wheel]
packages = ["fulcra_collect"]

# Ride the web-UI SPA + the in-app docs page INTO the wheel as package data,
# so a frozen app (Briefcase/py2app/pip) finds them relative to the installed
# fulcra_collect package — no dependence on the bundler's data-file handling
# or on the dev workspace layout. _resources.py reads these when frozen; in a
# dev checkout it reads the live workspace copies instead (so edits show up).
# Paths are relative to this pyproject (packages/collect/).
[tool.hatch.build.targets.wheel.force-include]
"../web-ui/dist" = "fulcra_collect/_bundled/web-ui/dist"
"../../docs/how-do-i-get-my-data.md" = "fulcra_collect/_bundled/docs/how-do-i-get-my-data.md"
