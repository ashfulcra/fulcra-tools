[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "fulcra-csv-importer"
version = "0.1.0"
description = "Import any CSV stream into Fulcra as annotations, with column mapping and dedup."
requires-python = ">=3.11"
dependencies = [
    "click>=8.1",
    "httpx>=0.27",
    "dateparser>=1.2",
    # Shared Fulcra API client (sibling package in this monorepo).
    "fulcra-common",
]

[tool.uv.sources]
fulcra-common = { workspace = true }

[project.scripts]
fulcra-csv = "fulcra_csv.cli:cli"

[project.optional-dependencies]
# The `fulcra` CLI console script. NOTE (2026-07-06): fulcra-api is in every
# install's tree anyway (fulcra-common hard-depends on it as a library since
# the CRUD delegation), so this extra no longer gates the dependency — what it
# DOES do is ensure the `fulcra` console script lands in the workspace venv
# (`uv sync --all-extras`), which the launchd-proof CLI resolver checks first
# (venv sibling, see fulcra_common.client.find_fulcra_cli). Keep it.
fulcra-cli = [
    "fulcra-api>=0.1.35",
]
dev = [
    "pytest>=7.4,<8",
    "ruff>=0.5",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra --strict-markers"

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.hatch.metadata]
allow-direct-references = true

[tool.hatch.build.targets.wheel]
packages = ["fulcra_csv"]
