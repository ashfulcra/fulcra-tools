[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "fulcra-dayone"
version = "0.1.0"
description = "Import selected Day One journal entries into Fulcra as annotations."
requires-python = ">=3.11"
dependencies = [
    "click>=8.1",
    "httpx>=0.27",
    "fulcra-common",
    "fulcra-csv-importer",
    "fulcra-collect",
]

[project.scripts]
fulcra-dayone = "fulcra_dayone.cli:cli"

[project.entry-points."fulcra_collect.plugins"]
dayone = "fulcra_dayone.collect_plugin:PLUGIN"

[tool.uv.sources]
fulcra-common = { workspace = true }
fulcra-csv-importer = { workspace = true }
fulcra-collect = { workspace = true }

[project.optional-dependencies]
dev = [
    "pytest>=7.4,<8",
    "ruff>=0.5",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra --strict-markers --import-mode=importlib"
# Adds tests/ to sys.path so test modules can `import dayone_test_helpers`
# (plain helper functions extracted from conftest that aren't pytest fixtures).
pythonpath = ["tests"]

[tool.hatch.build.targets.wheel]
packages = ["fulcra_dayone"]
