[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "fulcra-media-helpers"
version = "0.1.0"
description = "Import media consumption (Watched/Listened) into Fulcra as annotations."
requires-python = ">=3.11"
dependencies = [
    "click>=8.1",
    "httpx>=0.27",
    "dateparser>=1.2",
    "openpyxl>=3.1",
    "feedparser>=6.0",
    # The fulcra-api CLI must provide both `fulcra auth print-access-token`
    # (add-cli branch) and `fulcra file download` (file-commands branch).
    # Pin to a branch/tag that includes both, or vendor a merged fork.
    "fulcra-api @ git+https://github.com/fulcradynamics/fulcra-api-python.git@file-commands",
    # Sibling packages in this monorepo.
    "fulcra-common",
    "fulcra-csv-importer",  # the shared CSV → annotation parser
    "fulcra-collect",
]

[project.scripts]
fulcra-media = "fulcra_media.cli:cli"

[project.entry-points."fulcra_collect.plugins"]
lastfm = "fulcra_media.collect_plugins:LASTFM_PLUGIN"
deezer = "fulcra_media.collect_plugins:DEEZER_PLUGIN"
trakt = "fulcra_media.collect_plugins:TRAKT_PLUGIN"
netflix = "fulcra_media.collect_plugins:NETFLIX_PLUGIN"
spotify-extended = "fulcra_media.collect_plugins:SPOTIFY_EXTENDED_PLUGIN"
youtube = "fulcra_media.collect_plugins:YOUTUBE_PLUGIN"
apple-takeout = "fulcra_media.collect_plugins:APPLE_TAKEOUT_PLUGIN"
apple-music-takeout = "fulcra_media.collect_plugins:APPLE_MUSIC_TAKEOUT_PLUGIN"
generic-rss = "fulcra_media.collect_plugins:GENERIC_RSS_PLUGIN"
letterboxd = "fulcra_media.collect_plugins:LETTERBOXD_PLUGIN"
goodreads = "fulcra_media.collect_plugins:GOODREADS_PLUGIN"
apple-podcasts = "fulcra_media.collect_plugins:APPLE_PODCASTS_PLUGIN"
apple-podcasts-timemachine = "fulcra_media.collect_plugins:APPLE_PODCASTS_TIMEMACHINE_PLUGIN"
generic-csv = "fulcra_media.collect_plugins:GENERIC_CSV_PLUGIN"
media-webhook = "fulcra_media.collect_plugins:MEDIA_WEBHOOK_PLUGIN"

[tool.uv.sources]
# Resolve the sibling packages from the workspace, not PyPI.
fulcra-common = { workspace = true }
fulcra-csv-importer = { workspace = true }
fulcra-collect = { workspace = true }

[project.optional-dependencies]
dev = [
    # fulcra-api currently pins pytest<8 in its runtime deps, so we must
    # stay compatible with that constraint until upstream loosens it.
    "pytest>=7.4,<8",
    "pytest-mock>=3.12",
    "ruff>=0.5",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra --strict-markers --import-mode=importlib"
# Adds tests/ to sys.path so test modules can `import media_test_helpers`
# (plain helper functions extracted from conftest that aren't pytest fixtures).
pythonpath = ["tests"]

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.hatch.metadata]
allow-direct-references = true

[tool.hatch.build.targets.wheel]
packages = ["fulcra_media"]

