[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "fulcra-media-helpers"
version = "0.1.0"
description = "Import media consumption (Watched/Listened) into Fulcra as annotations."
requires-python = ">=3.11"
dependencies = [
    "click>=8.1",
    "httpx>=0.27",
    "dateparser>=1.2",
    "openpyxl>=3.1",
    "feedparser>=6.0",
    # Sibling packages in this monorepo.
    "fulcra-common",
    "fulcra-csv-importer",  # the shared CSV → annotation parser
    "fulcra-collect",
]

[project.scripts]
fulcra-media = "fulcra_media.cli:cli"

[project.entry-points."fulcra_collect.plugins"]
# Each plugin lives in its own module under fulcra_media.plugins.<id> and
# exposes a single PLUGIN constant — same convention as fulcra-attention
# and fulcra-dayone. spotify-ifttt is intentionally absent (one-time backfill
# tool, kept importable but not registered for the menubar/dashboard).
lastfm = "fulcra_media.plugins.lastfm:PLUGIN"
deezer = "fulcra_media.plugins.deezer:PLUGIN"
trakt = "fulcra_media.plugins.trakt:PLUGIN"
netflix = "fulcra_media.plugins.netflix:PLUGIN"
spotify-extended = "fulcra_media.plugins.spotify_extended:PLUGIN"
youtube = "fulcra_media.plugins.youtube:PLUGIN"
apple-takeout = "fulcra_media.plugins.apple_takeout:PLUGIN"
apple-music-takeout = "fulcra_media.plugins.apple_music_takeout:PLUGIN"
generic-rss = "fulcra_media.plugins.generic_rss:PLUGIN"
letterboxd = "fulcra_media.plugins.letterboxd:PLUGIN"
goodreads = "fulcra_media.plugins.goodreads:PLUGIN"
apple-podcasts = "fulcra_media.plugins.apple_podcasts:PLUGIN"
apple-podcasts-timemachine = "fulcra_media.plugins.apple_podcasts_timemachine:PLUGIN"
generic-csv = "fulcra_media.plugins.generic_csv:PLUGIN"
media-webhook = "fulcra_media.plugins.media_webhook:PLUGIN"

[tool.uv.sources]
# Resolve the sibling packages from the workspace, not PyPI.
fulcra-common = { workspace = true }
fulcra-csv-importer = { workspace = true }
fulcra-collect = { workspace = true }

[project.optional-dependencies]
# The `fulcra` CLI (auth print-access-token / file download). OPTIONAL on
# purpose: nothing here imports fulcra_api as a library — the daemon shells
# out to the `fulcra` binary, which users install separately
# (`uv tool install fulcra-api`, per docs/TESTING.md). Kept out of base deps
# so it doesn't drag pyarrow (~100 MB) into every install or the bundled app.
fulcra-cli = [
    "fulcra-api @ git+https://github.com/fulcradynamics/fulcra-api-python.git@file-commands",
]
dev = [
    # fulcra-api currently pins pytest<8 in its runtime deps, so we must
    # stay compatible with that constraint until upstream loosens it.
    "pytest>=7.4,<8",
    "pytest-mock>=3.12",
    "ruff>=0.5",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra --strict-markers --import-mode=importlib"
# Adds tests/ to sys.path so test modules can `import media_test_helpers`
# (plain helper functions extracted from conftest that aren't pytest fixtures).
pythonpath = ["tests"]

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.hatch.metadata]
allow-direct-references = true

[tool.hatch.build.targets.wheel]
packages = ["fulcra_media"]

