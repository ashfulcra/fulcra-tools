[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "coord-engine"
dynamic = ["version"]
description = "L1 of coord2 — the shared coord2 engine: reconcile + queries + roles fold over a fulcra-agent-teams namespace"
readme = "README.md"
requires-python = ">=3.10"
license = "MIT"
# stdlib-only runtime (transport is a CLI-subprocess call to `fulcra-api`); no runtime deps.
dependencies = []

[project.optional-dependencies]
dev = ["pytest"]

[project.scripts]
coord-engine = "coord_engine.cli:main"

[tool.hatch.version]
path = "coord_engine/__init__.py"

[tool.hatch.build.targets.wheel]
packages = ["coord_engine"]

# Ship the packaged default model map (ATC v2 reads it via importlib.resources).
[tool.hatch.build.targets.wheel.force-include]
"coord_engine/default_models.json" = "coord_engine/default_models.json"
