<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fulcra Collect</title>
  <link rel="stylesheet" href="/static/app.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- marked — full CommonMark + GFM renderer used by renderMd() in wizard.js.
       Pinned to an exact version + SRI hash so a CDN compromise can't
       silently swap the bundle. To upgrade: bump the version, recompute
       the hash with
         curl -s https://cdn.jsdelivr.net/npm/marked@<new-version>/marked.min.js \
           | openssl dgst -sha384 -binary | openssl base64 -A
       and update both src and integrity below. -->
  <script src="https://cdn.jsdelivr.net/npm/marked@15.0.12/marked.min.js"
          integrity="sha384-948ahk4ZmxYVYOc+rxN1H2gM1EJ2Duhp7uHtZ4WSLkV4Vtx5MUqnV+l7u9B+jFv+"
          crossorigin="anonymous"></script>
  <!-- Alpine pinned to an exact version + SRI hash (same upgrade dance
       as the marked tag above). -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"
          integrity="sha384-l8f0VcPi/M1iHPv8egOnY/15TDwqgbOR1anMIJWvU6nLRgZVLTLSaNqi/TOoT5Fh"
          crossorigin="anonymous"></script>
  <!-- Lit 3 — web-components base used by the setup_step renderer
       (refactor #68). Pinned + SRI'd exactly like marked + alpine.
       Note: Lit ships as an ES module, so type="module" (not classic) —
       this differs from marked/alpine, which are classic scripts.

       Why the gh/lit/dist@VER/all/lit-all.min.js URL instead of
       npm/lit@VER/index.js: the npm root entry contains BARE module
       specifiers (`import {…} from "@lit/reactive-element"`) which
       browsers cannot resolve without an import map. The lit-all bundle
       resolves those internally, so it Just Works from a <script
       type="module">. Found the hard way 2026-05-27 when the first cut
       at this tag silently failed with "Failed to resolve module
       specifier '@lit/reactive-element'" in the browser console.

       Upgrade dance: bump version, recompute the hash with
         curl -s https://cdn.jsdelivr.net/gh/lit/dist@<new>/all/lit-all.min.js \
           | openssl dgst -sha384 -binary | openssl base64 -A
       and update both src and integrity below. -->
  <script type="module"
          src="https://cdn.jsdelivr.net/gh/lit/dist@3.2.1/all/lit-all.min.js"
          integrity="sha384-6eOP+rg+J4nKf4UtKD8fqsZ6YceRLAp12ABz3pbrJvKSm504E6jX6xow/ITJrBTW"
          crossorigin="anonymous"></script>
  <!-- Setup-step web-component bundle (refactor #68). Module script so it
       resolves AFTER the Lit module above. Order matters: components must
       be registered as custom elements before <fulcra-step> appears in
       the DOM. Loaded before wizard.js / page scripts as a result. -->
  <script type="module" src="/static/components/index.js"></script>
</head>
<body class="bg-white text-slate-900 min-h-screen"
      x-data="app()"
      x-init="boot()"
      @onboarding-complete.window="route = 'dashboard'"
      @add-plugin.window="addPlugin()"
      @run-onboarding.window="runOnboarding()"
      @configure-plugin.window="openSetupForPlugin($event.detail.id)"
      @go-to-settings.window="goToSettings()"
      @go-to-dashboard.window="route = 'dashboard'"
      @go-to-docs.window="goToDocs($event.detail.name, $event.detail.title)">

  <main class="max-w-2xl mx-auto p-6">
    <header class="flex items-center gap-3 mb-8">
      <img src="/static/logo.svg" alt="Fulcra" class="w-8 h-8">
      <h1 class="text-2xl font-semibold tracking-tight">Fulcra Collect</h1>
    </header>

    <!-- Loading -->
    <template x-if="route === 'loading'">
      <div class="text-slate-500 animate-pulse">Loading…</div>
    </template>

    <!-- Error connecting to daemon -->
    <template x-if="route === 'error'">
      <div class="border border-red-200 bg-red-50 text-red-800 p-4 rounded-lg">
        <strong>Could not connect to the daemon.</strong>
        <p x-text="errorMessage" class="text-sm mt-1"></p>
        <button @click="boot()"
                class="mt-3 px-4 py-2 bg-red-700 text-white rounded text-sm hover:bg-red-800">
          Retry
        </button>
      </div>
    </template>

    <!-- ------------------------------------------------------------------ -->
    <!-- ONBOARDING                                                          -->
    <!-- ------------------------------------------------------------------ -->
    <template x-if="route === 'onboarding'">
      <section x-data="onboarding()" x-init="boot()">

        <!-- Whole-onboarding escape hatch — visible during the active flow
             (welcome → configure). Hidden on the final "done" screen, which
             has its own button. -->
        <template x-if="phase !== 'done'">
          <div class="flex justify-end mb-2">
            <button @click="if (confirm('Skip the rest of onboarding? You can finish configuring plugins later from Preferences.')) skipOnboarding()"
                    class="text-xs text-slate-400 hover:text-slate-600 underline">
              Skip onboarding
            </button>
          </div>
        </template>

        <!-- Phase: welcome -->
        <template x-if="phase === 'welcome'">
          <div class="space-y-6">
            <div>
              <h2 class="text-2xl font-semibold mb-4">Welcome to Fulcra Collect</h2>
              <p class="text-slate-600 leading-relaxed">
                Fulcra Collect is the local agent that watches your services and your machine,
                and writes the data into your Fulcra account — where you can see it alongside
                your health metrics, location, and calendar. It records your media life,
                attention, and personal logs in one place so you can ask Fulcra
                "what was I doing on Tuesday afternoon?" and get a real answer.
              </p>
            </div>
            <button @click="goToSignin()"
                    class="px-6 py-2.5 rounded bg-violet-600 text-white font-medium hover:bg-violet-700 transition-colors">
              Get Started
            </button>
          </div>
        </template>

        <!-- Phase: signin -->
        <template x-if="phase === 'signin'">
          <div class="space-y-6">
            <div>
              <h2 class="text-2xl font-semibold mb-2">Sign in to Fulcra</h2>
              <p class="text-slate-600 text-sm" x-show="signinMode === 'cli'">
                We'll open a browser tab so you can sign in to Fulcra securely.
                No tokens to copy and paste.
              </p>
              <p class="text-slate-600 text-sm" x-show="signinMode === 'token'">
                Paste your Fulcra access token below. You can find it in
                <a href="https://app.fulcra.io/settings/api" target="_blank"
                   class="text-violet-600 underline">Fulcra Settings → API</a>.
              </p>
              <p class="text-slate-500 text-xs" x-show="signinMode === 'auto'">
                Checking for the fulcra CLI…
              </p>
            </div>

            <!-- CLI / browser flow -->
            <div class="space-y-3" x-show="signinMode === 'cli'">
              <template x-if="signinError">
                <p class="text-red-600 text-sm" x-text="signinError"></p>
              </template>

              <template x-if="signinLoading">
                <div class="rounded border border-violet-200 bg-violet-50 p-3 text-sm text-violet-800">
                  <p class="font-medium">Waiting for browser sign-in…</p>
                  <p class="text-violet-700 mt-1">
                    A browser tab should have opened. Finish signing in there;
                    this page will move on automatically. The flow times out
                    after 2 minutes.
                  </p>
                </div>
              </template>

              <div class="flex gap-3" x-show="!signinLoading">
                <button @click="signinViaCli()"
                        class="px-6 py-2.5 rounded bg-violet-600 text-white font-medium hover:bg-violet-700 transition-colors">
                  Sign in with Fulcra
                </button>
                <button @click="phase = 'welcome'"
                        class="px-4 py-2 rounded border border-slate-300 text-slate-600 hover:bg-slate-50 text-sm">
                  Back
                </button>
              </div>

              <p class="text-xs text-slate-500">
                <a href="#" @click.prevent="signinMode = 'token'; signinError = ''"
                   class="text-violet-600 hover:underline">Use a token instead</a>
              </p>
            </div>

            <!-- Paste-token fallback flow -->
            <div class="space-y-3" x-show="signinMode === 'token'">
              <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Access token</label>
                <input type="password"
                       x-model="tokenInput"
                       @keydown.enter="submitToken()"
                       placeholder="Paste your token here…"
                       class="w-full border border-slate-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-violet-500 focus:border-transparent">
              </div>

              <template x-if="signinError">
                <p class="text-red-600 text-sm" x-text="signinError"></p>
              </template>

              <div class="flex gap-3">
                <button @click="submitToken()"
                        :disabled="signinLoading"
                        class="px-6 py-2.5 rounded bg-violet-600 text-white font-medium hover:bg-violet-700 disabled:opacity-50 transition-colors">
                  <span x-text="signinLoading ? 'Verifying…' : 'Sign In'"></span>
                </button>
                <button @click="phase = 'welcome'"
                        class="px-4 py-2 rounded border border-slate-300 text-slate-600 hover:bg-slate-50 text-sm">
                  Back
                </button>
              </div>

              <p class="text-xs text-slate-500" x-show="cliAvailable">
                <a href="#" @click.prevent="signinMode = 'cli'; signinError = ''"
                   class="text-violet-600 hover:underline">Use the browser sign-in instead</a>
              </p>
            </div>
          </div>
        </template>

        <!-- Phase: pick_plugins -->
        <template x-if="phase === 'pick_plugins'">
          <div class="space-y-6">
            <div>
              <h2 class="text-2xl font-semibold mb-2">Pick what to collect</h2>
              <p class="text-slate-600 text-sm">
                Choose the services you want to record. You can add more later.
              </p>
            </div>

            <template x-if="pickLoading">
              <div class="text-slate-500 text-sm animate-pulse">Loading plugins…</div>
            </template>

            <template x-if="pickError">
              <div class="text-red-600 text-sm" x-text="pickError"></div>
            </template>

            <template x-if="!pickLoading && !pickError">
              <div class="space-y-5">
                <template x-for="cat in categories" :key="cat.slug">
                  <div>
                    <h3 class="text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2"
                        x-text="cat.name"></h3>
                    <div class="space-y-1 border border-slate-200 rounded-lg overflow-hidden">
                      <template x-for="p in cat.plugins" :key="p.id">
                        <label class="flex items-start gap-3 px-4 py-3 hover:bg-slate-50 cursor-pointer border-b border-slate-100 last:border-0">
                          <input type="checkbox"
                                 :checked="isSelected(p.id)"
                                 @change="togglePlugin(p.id)"
                                 class="mt-0.5 h-4 w-4 rounded border-slate-300 text-violet-600 focus:ring-violet-500">
                          <div class="flex-1 min-w-0">
                            <div class="font-medium text-sm" x-text="p.name"></div>
                            <div class="text-xs text-slate-500 mt-0.5"
                                 x-text="p.description || ''"></div>
                          </div>
                          <template x-if="p.enabled">
                            <span class="text-xs text-violet-600 font-medium shrink-0 mt-0.5">enabled</span>
                          </template>
                        </label>
                      </template>
                    </div>
                  </div>
                </template>

                <div class="flex items-center gap-3 pt-2">
                  <button @click="startConfigure()"
                          class="px-6 py-2.5 rounded bg-violet-600 text-white font-medium hover:bg-violet-700 transition-colors">
                    <span x-text="selectedCount > 0 ? `Set up ${selectedCount} plugin${selectedCount !== 1 ? 's' : ''}` : 'Skip for now'"></span>
                  </button>
                  <span class="text-sm text-slate-500"
                        x-show="selectedCount > 0"
                        x-text="`${selectedCount} selected`"></span>
                </div>
              </div>
            </template>
          </div>
        </template>

        <!-- Phase: configure (per-plugin wizard walk) -->
        <template x-if="phase === 'configure'">
          <div class="space-y-6">
            <!-- Per-plugin header: small "Plugin N of M" progress label,
                 then the plugin name prominent on its own line so the
                 user can tell at a glance which plugin they're configuring. -->
            <div>
              <div class="text-xs text-slate-500 font-medium uppercase tracking-wide"
                   x-text="configureProgressLabel"></div>
              <div class="text-xl font-semibold text-slate-900 mt-0.5"
                   x-text="configurePluginName"></div>
            </div>

            <!-- Plugin with no setup_steps -->
            <template x-if="currentWizard && currentWizard._noSteps">
              <div class="space-y-5">
                <div>
                  <h2 class="text-xl font-semibold mb-1" x-text="currentWizard.pluginName"></h2>
                  <p class="text-slate-600 text-sm">
                    This plugin doesn't have a setup wizard yet — it will be
                    configured in Preferences once enabled.
                  </p>
                </div>
                <button @click="currentWizard.confirmNoSteps()"
                        class="px-6 py-2.5 rounded bg-violet-600 text-white font-medium hover:bg-violet-700">
                  Enable &amp; Continue
                </button>
              </div>
            </template>

            <!-- Plugin with setup_steps — wizard renderer -->
            <template x-if="currentWizard && !currentWizard._noSteps">
              <div x-data="currentWizard" class="space-y-5">

                <!-- Step indicator -->
                <div class="flex items-center gap-3">
                  <div class="flex-1 bg-slate-200 rounded-full h-1.5">
                    <div class="bg-violet-600 h-1.5 rounded-full transition-all"
                         :style="`width: ${progress_pct}%`"></div>
                  </div>
                  <span class="text-xs text-slate-500 shrink-0" x-text="progress_label"></span>
                </div>

                <!-- Step title — skipped for kind="done" because that
                     step's render block has its own title alongside the
                     green checkmark (task #71). -->
                <template x-if="current_step.kind !== 'done'">
                  <h2 class="text-xl font-semibold" x-text="current_step.title"></h2>
                </template>

                <!-- Lit dispatcher (refactor #68). Routes by step.kind into
                     the matching <fulcra-step-*> component registered in
                     window.FulcraStepComponents (see static/components/).
                     x-effect writes properties (not attributes) so the
                     component receives real step/ctx objects rather than
                     their toString().

                     The `void [healthChecking, ...]` list reads every
                     Alpine-reactive property the components care about as
                     deps, so x-effect re-fires on ANY ctx state change
                     (not just current_step). $el.requestUpdate() then
                     forces a Lit cycle, and FulcraStepBase's
                     `hasChanged: () => true` (see _base.js) makes the
                     reassignment of .step/.ctx count as a change even
                     though the references are identity-equal (Alpine
                     mutates ctx in place).

                     Why an explicit identifier list instead of
                     `Object.values($data)`: Alpine's x-effect evaluator
                     wraps the expression in dep-tracking, but iteration
                     helpers like Object.values, JSON.stringify, and
                     spread `{...$data}` perform their property reads in
                     native code that doesn't go through Alpine's
                     property-access tracker, so the inner properties
                     never register as deps. Bare identifiers in the
                     expression DO get wrapped, so the explicit list works.
                     Discovered 2026-05-27 when the test_connection
                     spinner stayed on screen after healthChecking
                     flipped to false even though `Object.values($data)`
                     was supposedly tracking everything.

                     Keep this list in sync with the set of ctx fields
                     mutated by createWizard methods. Adding a new
                     reactive field to a future component? Add it here
                     too. -->
                <fulcra-step x-effect="$el.step = current_step; $el.ctx = $data; void [healthChecking, healthResult, healthError, dpLoading, dpError, dpDefinitions, dpOtherDefinitions, dpSelectedId, dpShowOther, dpForceNew, dpNewName, oauthStatus, uploadedFileName, uploadInFlight, uploadProgress, permissionResult, permissionChecking, current_permission_id, extensionConfirmed, pairStatus, pairFallbackToken, pairManuallyConfirmed, firstRunStatus, firstRunSummary, firstRunTimelineUrl, nextBlocked, stepError, body_html, input_fields, inputValues]; $el.requestUpdate?.()"></fulcra-step>

                <!-- Step error -->
                <template x-if="stepError">
                  <p class="text-red-600 text-sm" x-text="stepError"></p>
                </template>

                <!-- Back / Next navigation + skip escape hatches -->
                <div class="flex items-center gap-3 pt-2 border-t border-slate-100">
                  <template x-if="has_back">
                    <button @click="back()"
                            class="px-4 py-2 rounded border border-slate-300 text-slate-600 hover:bg-slate-50 text-sm">
                      Back
                    </button>
                  </template>

                  <!-- On step 0 of a plugin inside the onboarding multi-plugin
                       walk, give the user a way back to the pick_plugins screen
                       so they can add/remove picks without losing existing
                       selections (task #64). Not shown in the single-plugin
                       Configure flow from the dashboard — that route doesn't
                       pass on_back_to_pick_plugins, so has_back_to_pick_plugins
                       is false. -->
                  <template x-if="!has_back && has_back_to_pick_plugins">
                    <button @click="backToPluginList()"
                            class="px-4 py-2 rounded border border-slate-300 text-slate-600 hover:bg-slate-50 text-sm">
                      ← Plugin list
                    </button>
                  </template>

                  <template x-if="!is_done_step">
                    <button @click="next()"
                            :disabled="nextBlocked"
                            class="px-6 py-2.5 rounded bg-violet-600 text-white font-medium hover:bg-violet-700 disabled:opacity-40 transition-colors text-sm">
                      Next
                    </button>
                  </template>

                  <template x-if="is_done_step">
                    <button @click="next()"
                            class="px-6 py-2.5 rounded bg-violet-600 text-white font-medium hover:bg-violet-700 transition-colors text-sm">
                      Continue
                    </button>
                  </template>

                  <!-- Skip escape hatches — pushed right so they sit visually
                       apart from the primary Back/Next pair. Per-step skip
                       only shown when there's a next step; "Skip plugin"
                       always available so a stuck user can abandon a single
                       plugin without bailing on the whole onboarding. -->
                  <div class="flex-1"></div>
                  <template x-if="has_next">
                    <button @click="skipStep()"
                            class="text-xs text-slate-400 hover:text-slate-600 underline">
                      Skip step
                    </button>
                  </template>
                  <button @click="if (confirm('Skip this plugin? It won\'t be enabled — you can configure it later from Preferences.')) skipPlugin()"
                          class="text-xs text-slate-400 hover:text-slate-600 underline">
                    Skip plugin
                  </button>
                </div>

              </div>
            </template>

          </div>
        </template>

        <!-- Phase: done -->
        <template x-if="phase === 'done'">
          <div class="space-y-6">
            <div class="flex items-center gap-4">
              <div class="w-14 h-14 rounded-full bg-green-100 flex items-center justify-center">
                <svg class="w-8 h-8 text-green-600" viewBox="0 0 24 24" fill="none">
                  <path d="M5 13l4 4L19 7" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </div>
              <div>
                <h2 class="text-2xl font-semibold">You're all set!</h2>
                <p class="text-slate-600 text-sm mt-1"
                   x-text="enabledCount > 0 ? `You enabled ${enabledCount} plugin${enabledCount !== 1 ? 's' : ''}.` : 'You can enable plugins any time from the dashboard.'">
                </p>
              </div>
            </div>

            <p class="text-slate-600 text-sm">
              Fulcra Collect is now running in the background. Enabled plugins will
              sync on their schedules, and you can check on them in the dashboard.
            </p>

            <button @click="completeDone()"
                    class="px-6 py-2.5 rounded bg-violet-600 text-white font-medium hover:bg-violet-700 transition-colors">
              View Dashboard
            </button>
          </div>
        </template>

      </section>
    </template>

    <!-- ------------------------------------------------------------------ -->
    <!-- SETUP-PLUGIN (per-plugin re-configure from dashboard)              -->
    <!--                                                                    -->
    <!-- Reached via the Configure button on a dashboard row. Loads that    -->
    <!-- plugin's contract and runs it through the same wizard the          -->
    <!-- onboarding flow uses, then routes straight back to the dashboard   -->
    <!-- (no "next plugin", no enabled-count accounting). Task #61.         -->
    <!-- ------------------------------------------------------------------ -->
    <template x-if="route === 'setup-plugin'">
      <section class="space-y-6">

        <!-- Header: back-to-dashboard escape hatch + plugin name -->
        <div class="flex items-center justify-between">
          <button @click="route = 'dashboard'"
                  class="text-xs text-slate-400 hover:text-slate-600 underline">
            ← Back to dashboard
          </button>
        </div>

        <!-- Contract still loading -->
        <template x-if="!setupContract && !setupContractError">
          <div class="text-slate-400 text-sm animate-pulse">Loading plugin setup…</div>
        </template>

        <!-- Contract load failed -->
        <template x-if="setupContractError">
          <div class="border border-red-200 bg-red-50 text-red-800 p-4 rounded-lg">
            <strong>Could not load this plugin's setup.</strong>
            <p class="text-sm mt-1" x-text="setupContractError"></p>
            <button @click="route = 'dashboard'"
                    class="mt-3 px-4 py-2 bg-red-700 text-white rounded text-sm hover:bg-red-800">
              Back to dashboard
            </button>
          </div>
        </template>

        <!-- Plugin has no setup steps — the wizard renders a "nothing to do" placeholder -->
        <template x-if="setupWizard && setupWizard._noSteps">
          <div class="space-y-5">
            <div>
              <h2 class="text-xl font-semibold mb-1" x-text="setupWizard.pluginName"></h2>
              <p class="text-slate-600 text-sm">
                This plugin doesn't have a setup wizard yet — it will be
                configured in Preferences once enabled.
              </p>
            </div>
            <button @click="setupWizard.confirmNoSteps()"
                    class="px-6 py-2.5 rounded bg-violet-600 text-white font-medium hover:bg-violet-700">
              Enable &amp; Return to Dashboard
            </button>
          </div>
        </template>

        <!-- Plugin has setup_steps — reuse the same wizard renderer as onboarding -->
        <template x-if="setupWizard && !setupWizard._noSteps">
          <div x-data="setupWizard" class="space-y-5">

            <!-- Step indicator -->
            <div class="flex items-center gap-3">
              <div class="flex-1 bg-slate-200 rounded-full h-1.5">
                <div class="bg-violet-600 h-1.5 rounded-full transition-all"
                     :style="`width: ${progress_pct}%`"></div>
              </div>
              <span class="text-xs text-slate-500 shrink-0" x-text="progress_label"></span>
            </div>

            <!-- Step title — skipped for kind="done"; see configure-phase
                 copy at the equivalent block above. (task #71) -->
            <template x-if="current_step.kind !== 'done'">
              <h2 class="text-xl font-semibold" x-text="current_step.title"></h2>
            </template>

            <!-- Lit dispatcher (refactor #68). Routes by step.kind into
                 the matching <fulcra-step-*> component registered in
                 window.FulcraStepComponents (see static/components/).
                 See the equivalent block in the configure-phase render
                 site (~line 327) for the full rationale on the
                 `Object.values($data); $el.requestUpdate?.()` tail. -->
            <fulcra-step x-effect="$el.step = current_step; $el.ctx = $data; void [healthChecking, healthResult, healthError, dpLoading, dpError, dpDefinitions, dpOtherDefinitions, dpSelectedId, dpShowOther, dpForceNew, dpNewName, oauthStatus, uploadedFileName, uploadInFlight, uploadProgress, permissionResult, permissionChecking, current_permission_id, extensionConfirmed, pairStatus, pairFallbackToken, pairManuallyConfirmed, firstRunStatus, firstRunSummary, firstRunTimelineUrl, nextBlocked, stepError, body_html, input_fields, inputValues]; $el.requestUpdate?.()"></fulcra-step>

            <template x-if="stepError">
              <p class="text-red-600 text-sm" x-text="stepError"></p>
            </template>

            <!-- Back / Next nav (skipPlugin returns to dashboard via on_skip_plugin) -->
            <div class="flex items-center gap-3 pt-2 border-t border-slate-100">
              <template x-if="has_back">
                <button @click="back()"
                        class="px-4 py-2 rounded border border-slate-300 text-slate-600 hover:bg-slate-50 text-sm">
                  Back
                </button>
              </template>

              <template x-if="!is_done_step">
                <button @click="next()"
                        :disabled="nextBlocked"
                        class="px-6 py-2.5 rounded bg-violet-600 text-white font-medium hover:bg-violet-700 disabled:opacity-40 transition-colors text-sm">
                  Next
                </button>
              </template>

              <template x-if="is_done_step">
                <button @click="next()"
                        class="px-6 py-2.5 rounded bg-violet-600 text-white font-medium hover:bg-violet-700 transition-colors text-sm">
                  Done
                </button>
              </template>

              <div class="flex-1"></div>
              <button @click="if (confirm('Cancel this plugin\'s setup? Any partial changes will not be applied.')) skipPlugin()"
                      class="text-xs text-slate-400 hover:text-slate-600 underline">
                Cancel setup
              </button>
            </div>

          </div>
        </template>

      </section>
    </template>

    <!-- ------------------------------------------------------------------ -->
    <!-- SETTINGS — Annotation tracks (task #42)                            -->
    <!--                                                                    -->
    <!-- Lists every non-deleted Fulcra annotation definition on the user's -->
    <!-- account with a Delete button per row.  Soft-delete is the only     -->
    <!-- delete primitive Fulcra exposes — events written under the def     -->
    <!-- remain in Fulcra but the def stops showing up in pickers.  Any     -->
    <!-- plugin whose cached definition_id matched the deleted def gets     -->
    <!-- its cache cleared server-side (see web.py:delete_definition_route) -->
    <!-- so the next run resolves a fresh def rather than writing to a      -->
    <!-- tombstone.                                                         -->
    <!-- ------------------------------------------------------------------ -->
    <!-- ------------------------------------------------------------------ -->
    <!-- Docs viewer (task #51). Fetches docs/<name>.md from the daemon     -->
    <!-- and renders it via the marked library already loaded in <head>.    -->
    <!-- Lives in app() (not its own component) because it has no per-      -->
    <!-- instance state beyond what app() already tracks. Reached from the  -->
    <!-- "Data sources" link in the dashboard header.                       -->
    <!-- ------------------------------------------------------------------ -->
    <template x-if="route === 'docs'">
      <section class="space-y-4">
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-3">
            <h2 class="text-xl font-semibold" x-text="docsTitle"></h2>
            <button @click="route = 'dashboard'"
                    class="text-xs text-slate-400 hover:text-violet-600 underline">
              ← Back to dashboard
            </button>
          </div>
        </div>

        <template x-if="docsLoading">
          <div class="text-slate-400 text-sm animate-pulse">Loading…</div>
        </template>

        <template x-if="docsError && !docsLoading">
          <div class="text-red-600 text-sm bg-red-50 border border-red-200 rounded p-3"
               x-text="docsError"></div>
        </template>

        <!-- Rendered markdown. Tailwind's prose plugin isn't loaded so
             we use a manual stack of typography hints via inline classes
             — keep it readable without pulling in the prose dep. -->
        <article class="max-w-3xl text-sm text-slate-700 leading-relaxed
                        [&_h1]:text-2xl [&_h1]:font-semibold [&_h1]:mt-6 [&_h1]:mb-3
                        [&_h2]:text-lg  [&_h2]:font-semibold [&_h2]:mt-6 [&_h2]:mb-2 [&_h2]:text-slate-900
                        [&_h3]:text-base [&_h3]:font-semibold [&_h3]:mt-4 [&_h3]:mb-1
                        [&_p]:mb-3
                        [&_ul]:list-disc [&_ul]:pl-5 [&_ul]:mb-3 [&_ul]:space-y-1
                        [&_li]:text-sm
                        [&_a]:text-violet-600 [&_a:hover]:underline
                        [&_code]:bg-slate-100 [&_code]:rounded [&_code]:px-1 [&_code]:py-0.5 [&_code]:text-xs [&_code]:font-mono
                        [&_pre]:bg-slate-900 [&_pre]:text-slate-100 [&_pre]:rounded [&_pre]:p-3 [&_pre]:overflow-x-auto [&_pre]:text-xs
                        [&_pre_code]:bg-transparent [&_pre_code]:text-inherit [&_pre_code]:p-0
                        [&_strong]:font-semibold [&_strong]:text-slate-900
                        [&_hr]:my-6 [&_hr]:border-slate-200"
                 x-html="docsHtml"></article>
      </section>
    </template>

    <template x-if="route === 'settings'">
      <section x-data="settings()" x-init="boot()" class="space-y-6">

        <!-- Header: title + back-to-dashboard link -->
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-3">
            <h2 class="text-xl font-semibold">Settings</h2>
            <button @click="$dispatch('go-to-dashboard')"
                    class="text-xs text-slate-400 hover:text-violet-600 underline">
              ← Back to dashboard
            </button>
          </div>
        </div>

        <!-- ──────────────────────────────────────────────────────────── -->
        <!-- Quick-record favorites (task #64).                           -->
        <!-- Per-machine. The menubar's pin toggle and this list share   -->
        <!-- the same daemon endpoints; opening this page after pinning  -->
        <!-- in the menubar shows the user's actual current pin state.   -->
        <!-- ──────────────────────────────────────────────────────────── -->
        <div class="border border-slate-200 rounded-lg p-4 space-y-3">
          <div class="flex items-baseline justify-between gap-3">
            <h3 class="text-base font-semibold">Quick-record favorites</h3>
            <span class="text-xs text-slate-500"
                  x-text="`${favoritesCount} favorite${favoritesCount === 1 ? '' : 's'} selected`"></span>
          </div>
          <p class="text-xs text-slate-500 max-w-2xl">
            Pinned annotations appear at the top of the menubar's quick-record list,
            and the menubar defaults to showing only favorites when any are set.
            The menubar's pin toggle and this page stay in sync — both write to
            <code class="text-[10px] bg-slate-100 px-1 py-0.5 rounded">~/.config/fulcra-collect/quick_record_favorites.json</code>
            on this machine. Cross-machine sync is coming in a later release.
          </p>

          <template x-if="favoritesError">
            <div class="text-xs text-red-700 bg-red-50 border border-red-200 rounded p-2"
                 x-text="favoritesError"></div>
          </template>

          <template x-if="!loading && sortedDefinitions.length > 0">
            <div class="divide-y divide-slate-100 border border-slate-100 rounded">
              <template x-for="def in sortedDefinitions" :key="`fav-${def.id}`">
                <label class="flex items-center gap-3 px-3 py-2 hover:bg-slate-50 cursor-pointer">
                  <input type="checkbox"
                         :checked="isFavorite(def)"
                         :disabled="favoritesSaving"
                         @change="toggleFavorite(def)"
                         class="w-4 h-4 text-violet-600 border-slate-300 rounded focus:ring-violet-500 disabled:opacity-40">
                  <div class="flex-1 min-w-0">
                    <div class="text-sm text-slate-900 truncate" x-text="def.name"></div>
                    <div class="text-[11px] text-slate-500"
                         x-text="`${def.annotation_type || 'unknown type'} · created ${humanDate(def.created_at)}`"></div>
                  </div>
                </label>
              </template>
            </div>
          </template>

          <template x-if="!loading && sortedDefinitions.length === 0">
            <div class="text-xs text-slate-400">
              No annotation definitions yet — favorites become available once
              you have at least one annotation track.
            </div>
          </template>
        </div>

        <!-- ──────────────────────────────────────────────────────────── -->
        <!-- Annotation tracks (soft-delete; existing task #42 surface). -->
        <!-- ──────────────────────────────────────────────────────────── -->
        <h3 class="text-base font-semibold pt-2">Annotation tracks</h3>

        <p class="text-sm text-slate-500 max-w-2xl">
          These are the annotation definitions on your Fulcra account.
          Soft-deleting one removes it from pickers; the events already
          written under it stay in Fulcra but no longer surface in the
          definitions list. Any plugin currently bound to a deleted track
          will resolve a fresh one on its next run.
        </p>

        <!-- Inline success banner (last successful delete) -->
        <template x-if="lastDeletedName">
          <div class="rounded border border-emerald-200 bg-emerald-50 px-3 py-2 text-sm text-emerald-800 flex items-center justify-between">
            <span>Removed <strong x-text="lastDeletedName"></strong>.</span>
            <button @click="lastDeletedName = ''"
                    class="text-xs text-emerald-600 hover:text-emerald-800 underline">
              Dismiss
            </button>
          </div>
        </template>

        <!-- Loading / error -->
        <template x-if="loading">
          <div class="text-slate-400 text-sm animate-pulse">
            Loading your annotation definitions…
          </div>
        </template>

        <template x-if="error && !loading">
          <div class="text-red-600 text-sm bg-red-50 border border-red-200 rounded p-3"
               x-text="error"></div>
        </template>

        <!-- Empty state — user has no defs at all (or just deleted the last one) -->
        <template x-if="!loading && !error && sortedDefinitions.length === 0">
          <div class="text-center py-12 text-slate-400">
            <p class="text-sm">No annotation definitions on your account yet.</p>
            <p class="text-xs mt-1">
              Enabled plugins create them on first run.
            </p>
          </div>
        </template>

        <!-- Definition list — same visual weight as dashboard plugin rows -->
        <template x-if="!loading && sortedDefinitions.length > 0">
          <div class="space-y-2">
            <template x-for="def in sortedDefinitions" :key="def.id">
              <div class="border border-slate-200 rounded-lg px-4 py-3 hover:border-slate-300 transition-colors">
                <div class="flex items-start justify-between gap-3">
                  <div class="flex-1 min-w-0">
                    <div class="font-medium text-sm text-slate-900" x-text="def.name"></div>
                    <div class="text-xs text-slate-500 mt-0.5"
                         x-text="`${def.annotation_type || 'unknown type'} · created ${humanDate(def.created_at)}`"></div>
                  </div>

                  <div class="flex items-center gap-2 shrink-0">
                    <button @click="deleteDef(def)"
                            :disabled="isDeleting(def)"
                            class="px-3 py-1.5 text-xs rounded border border-red-300 text-red-700 hover:bg-red-50 disabled:opacity-40 transition-colors"
                            title="Soft-delete this annotation definition">
                      <span x-text="isDeleting(def) ? 'Deleting…' : 'Delete'"></span>
                    </button>
                  </div>
                </div>
              </div>
            </template>
          </div>
        </template>

      </section>
    </template>

    <!-- ------------------------------------------------------------------ -->
    <!-- DASHBOARD                                                           -->
    <!-- ------------------------------------------------------------------ -->
    <!-- 'add_plugin' route no longer exists: clicking "+ Add plugin" now sets
         route = 'onboarding' (with a pick_plugins entry flag) so the shared
         onboarding flow handles the picker UI. -->
    <template x-if="route === 'dashboard'">
      <section x-data="dashboard()" x-init="boot()" class="space-y-8">

        <!-- Header row -->
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-3">
            <h2 class="text-xl font-semibold">Dashboard</h2>
            <!-- Escape hatch back into onboarding for users who skipped out
                 mid-flow or want to re-pick plugins. Wired via the parent
                 app() so route + state are reset cleanly. (task #62) -->
            <!-- $dispatch bubbles to the body's @run-onboarding.window listener,
                 which calls app().runOnboarding() — the only place that knows
                 how to reset route + wizard state. $root doesn't reach app()
                 from inside a nested x-data scope. -->
            <button @click="$dispatch('run-onboarding')"
                    class="text-xs text-slate-400 hover:text-violet-600 underline"
                    title="Restart the onboarding wizard">
              Run setup wizard
            </button>
            <!-- Settings entry point (task #42). Same dispatch-to-app
                 pattern as Run setup wizard above — the body's
                 @go-to-settings.window listener calls goToSettings(). -->
            <button @click="$dispatch('go-to-settings')"
                    class="text-xs text-slate-400 hover:text-violet-600 underline"
                    title="Manage annotation tracks">
              Settings
            </button>
            <!-- "How do I get my data?" reference. The doc is bundled
                 in the repo at docs/how-do-i-get-my-data.md and served
                 by the daemon at /api/docs/<name>; the in-app docs
                 viewer renders it via marked. We can't link to the
                 GitHub blob URL because the repo is private (it would
                 404 to any signed-out user). -->
            <button @click="$dispatch('go-to-docs', { name: 'how-do-i-get-my-data', title: 'How do I get my data into Fulcra?' })"
                    class="text-xs text-slate-400 hover:text-violet-600 underline"
                    title="Lookup page: every supported source and pathway">
              Data sources
            </button>
          </div>
          <button @click="addPlugin()"
                  class="px-4 py-2 text-sm rounded bg-violet-600 text-white font-medium hover:bg-violet-700 transition-colors">
            + Add plugin
          </button>
        </div>

        <!-- Loading / error -->
        <template x-if="loading">
          <div class="text-slate-400 text-sm animate-pulse">Loading plugins…</div>
        </template>
        <template x-if="error">
          <div class="text-red-600 text-sm" x-text="error"></div>
        </template>

        <!-- ============================================================== -->
        <!-- Plugins, split into Enabled (top) + Disabled (below). Headings -->
        <!-- collapse when their section is empty so the dashboard reads    -->
        <!-- cleanly for both first-time and fully-configured users.        -->
        <!-- ============================================================== -->
        <template x-if="!loading && enabledPlugins.length > 0">
          <div class="space-y-2">
            <h3 class="text-xs font-semibold uppercase tracking-wider text-slate-400 mb-3">Enabled</h3>
            <template x-for="p in enabledPlugins" :key="p.id">
              <div class="border border-slate-200 rounded-lg px-4 py-3 hover:border-slate-300 transition-colors">
                <div class="flex items-start justify-between gap-3">
                  <div class="flex-1 min-w-0">
                    <div class="flex items-center gap-2 mb-0.5">
                      <span class="font-medium text-sm" x-text="p.name"></span>
                      <span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium"
                            :class="pillClass(p)"
                            x-text="pillLabel(p)"></span>
                    </div>
                    <p class="text-xs text-slate-500" x-text="p.description || ''"></p>
                    <div class="flex items-center gap-3 mt-1">
                      <template x-if="humanInterval(p)">
                        <p class="text-xs text-slate-400" x-text="humanInterval(p)"></p>
                      </template>
                      <p class="text-xs text-slate-400" x-text="lastRunLabel(p)"></p>
                    </div>
                  </div>

                  <div class="flex items-center gap-2 shrink-0">
                    <template x-if="canRunNow(p)">
                      <button @click="runNow(p)"
                              :disabled="isRunning(p)"
                              class="px-3 py-1.5 text-xs rounded border border-slate-300 text-slate-600 hover:bg-slate-50 disabled:opacity-40 transition-colors">
                        <span x-text="isRunning(p) ? 'Running…' : 'Run now'"></span>
                      </button>
                    </template>

                    <button @click="configurePlugin(p)"
                            class="px-3 py-1.5 text-xs rounded border border-slate-300 text-slate-600 hover:bg-slate-50 transition-colors"
                            title="Re-run this plugin's setup wizard">
                      Configure
                    </button>

                    <button @click="disablePlugin(p)"
                            class="px-3 py-1.5 text-xs rounded border border-slate-300 text-slate-500 hover:bg-slate-50 transition-colors"
                            title="Stop this plugin from running on its schedule">
                      Disable
                    </button>
                  </div>
                </div>
              </div>
            </template>
          </div>
        </template>

        <template x-if="!loading && disabledPlugins.length > 0">
          <div class="space-y-2">
            <h3 class="text-xs font-semibold uppercase tracking-wider text-slate-400 mb-3">Disabled</h3>
            <template x-for="p in disabledPlugins" :key="p.id">
              <div class="border border-slate-200 rounded-lg px-4 py-3 hover:border-slate-300 transition-colors">
                <div class="flex items-start justify-between gap-3">
                  <div class="flex-1 min-w-0">
                    <div class="flex items-center gap-2 mb-0.5">
                      <span class="font-medium text-sm" x-text="p.name"></span>
                      <span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium"
                            :class="pillClass(p)"
                            x-text="pillLabel(p)"></span>
                    </div>
                    <p class="text-xs text-slate-500" x-text="p.description || ''"></p>
                    <div class="flex items-center gap-3 mt-1">
                      <template x-if="humanInterval(p)">
                        <p class="text-xs text-slate-400" x-text="humanInterval(p)"></p>
                      </template>
                      <p class="text-xs text-slate-400" x-text="lastRunLabel(p)"></p>
                    </div>
                  </div>

                  <div class="flex items-center gap-2 shrink-0">
                    <button @click="configurePlugin(p)"
                            class="px-3 py-1.5 text-xs rounded bg-violet-600 text-white text-xs font-medium hover:bg-violet-700 transition-colors"
                            title="Set up and enable this plugin">
                      Configure
                    </button>
                  </div>
                </div>
              </div>
            </template>
          </div>
        </template>

        <template x-if="!loading && plugins.length === 0">
          <div class="text-center py-12 text-slate-400">
            <p class="text-sm">No plugins configured yet.</p>
            <button @click="addPlugin()"
                    class="mt-3 text-violet-600 text-sm hover:underline">Add a plugin to get started</button>
          </div>
        </template>

        <!-- Activity feed — Phase D: polls /api/activity every 5s while dashboard is active -->
        <div class="border-t border-slate-100 pt-6">
          <h3 class="text-xs font-semibold uppercase tracking-wider text-slate-400 mb-3">Recently</h3>

          <template x-if="activityLoading && activityEntries.length === 0">
            <div class="text-slate-400 text-sm animate-pulse">Loading activity…</div>
          </template>

          <template x-if="activityError">
            <div class="text-red-500 text-xs" x-text="activityError"></div>
          </template>

          <template x-if="!activityLoading && activityEntries.length === 0">
            <div class="text-slate-400 text-sm py-4 text-center">
              No activity yet — plugin runs (and any failures) will show up here.
            </div>
          </template>

          <template x-if="activityEntries.length > 0">
            <div class="divide-y divide-slate-100">
              <template x-for="entry in activityEntries" :key="entry.timestamp + entry.plugin_id + entry.summary">
                <div class="flex items-center gap-3 py-2">
                  <span class="text-xs text-slate-400 w-20 shrink-0"
                        x-text="timeAgo(entry.timestamp)"></span>
                  <span class="text-xs font-medium uppercase tracking-wide text-slate-500 w-28 shrink-0 truncate"
                        x-text="entry.plugin_id"></span>
                  <span class="text-sm truncate"
                        :class="entry.ok ? 'text-slate-900' : 'text-red-600'"
                        x-text="entry.summary"></span>
                </div>
              </template>
            </div>
          </template>
        </div>

      </section>
    </template>

  </main>

  <script src="/static/wizard.js"></script>
  <script src="/static/onboarding.js"></script>
  <script src="/static/dashboard.js"></script>
  <script src="/static/settings.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
