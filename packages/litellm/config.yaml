# LiteLLM proxy config — pass-through to OpenRouter for any model.
#
# Wildcard route: whatever model name the sandbox sends (e.g.
# "anthropic/claude-sonnet-4.5"), LiteLLM rewrites it to "openrouter/<that>" and
# calls OpenRouter with OPENROUTER_API_KEY. Lets us swap models per spawn
# without touching this config.

model_list:
  - model_name: "*"
    litellm_params:
      model: "openrouter/*"
      api_key: os.environ/OPENROUTER_API_KEY

litellm_settings:
  # Allow arbitrary params from clients; LiteLLM drops what the upstream doesn't accept.
  drop_params: true
  # Reasonable defaults; tweak per workload if needed.
  request_timeout: 600   # 10 min; covers long agentic chains.

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  # Optional: store completion logs in Postgres for per-key spend audits.
  store_model_in_db: true
