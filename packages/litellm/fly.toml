# Fly.io app config for the LiteLLM proxy.
# Region matches Vercel Sandbox (iad1 ↔ iad) so the proxy + sandboxes are colocated.

app = "fulcra-litellm"
primary_region = "iad"

[build]
  # Uses the local Dockerfile next to this file.

[http_service]
  internal_port = 4000
  force_https = true
  # Keep the proxy always-on so sandboxes never hit a cold-start mid-demo.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  # LiteLLM's Python base + Postgres pool sits around 400-500 MB resident; 512 MB
  # OOM-killed within 2 min in the first deploy. 1 GB has comfortable headroom.
  memory = "1024mb"
  cpu_kind = "shared"
  cpus = 1
