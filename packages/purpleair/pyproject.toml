[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "fulcra-purpleair"
version = "0.1.0"
description = "Fulcra Collect plugin: PurpleAir air-quality readings as per-measure NumericAnnotation tracks."
requires-python = ">=3.11"
dependencies = [
    "httpx>=0.27",
    # Sibling packages in this monorepo.
    "fulcra-common",   # wire format + BaseFulcraClient + IngestPipeline + definition resolver
    "fulcra-collect",  # plugin contract + RunContext (keychain/config/KV/dedup seams)
]

[project.entry-points."fulcra_collect.plugins"]
purpleair = "fulcra_purpleair.collect_plugin:PLUGIN"

[tool.uv.sources]
# Resolve the sibling packages from the workspace, not PyPI.
fulcra-common = { workspace = true }
fulcra-collect = { workspace = true }

[project.optional-dependencies]
dev = [
    # fulcra-api pins pytest<8 in its runtime deps, so stay compatible.
    "pytest>=7.4,<8",
    "ruff>=0.5",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra --strict-markers --import-mode=importlib"

[tool.hatch.metadata]
allow-direct-references = true

[tool.hatch.build.targets.wheel]
packages = ["fulcra_purpleair"]

[tool.ruff]
target-version = "py311"
line-length = 100
